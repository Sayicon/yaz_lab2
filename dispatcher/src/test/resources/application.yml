spring:
  application:
    name: dispatcher-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:9999
          predicates:
            - Path=/users/**
        - id: auth-service
          uri: http://localhost:9999
          predicates:
            - Path=/auth/**

jwt:
  secret: yazlab2-super-secret-key-change-in-prod-256bit

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
