spring:
  application:
    name: dispatcher-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:9999}
          predicates:
            - Path=/users/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:9999}
          predicates:
            - Path=/products/**
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:9999}
          predicates:
            - Path=/auth/**
        - id: dead-service
          uri: ${DEAD_SERVICE_URL:http://localhost:1}
          predicates:
            - Path=/dead/**

jwt:
  secret: yazlab2-super-secret-key-change-in-prod-256bit

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
